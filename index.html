<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding and viewport -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- SEO Meta Tags -->
    <title>Porous Being</title>
    <meta
      name="description"
      content="Explore our award-winning architectural and design projects. From sustainable residential developments to innovative infrastructure solutions."
    />
    <meta
      name="keywords"
      content="architecture, design, projects, portfolio, residential, commercial, sustainable design"
    />
    <meta name="author" content="Porous Being" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://porous-being.com/" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Porous Being | Architecture & Design Portfolio"
    />
    <meta
      property="og:description"
      content="Explore our award-winning architectural and design projects."
    />
    <meta property="og:url" content="https://porous-being.com/" />
    <meta property="og:site_name" content="Porous Being" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Porous Being | Architecture & Design Portfolio"
    />
    <meta
      name="twitter:description"
      content="Explore our award-winning architectural and design projects."
    />

    <!-- Favicon and Apple Touch Icon -->
    <link rel="icon" type="image/png" href="/Porous_favi.png" />
    <link rel="apple-touch-icon" href="/Porous_favi.png" />

    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Material Symbols Font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0&display=swap"
    />

    <!-- Performance: Prefetch DNS for external domains (if applicable) -->
    <link rel="prefetch" href="https://fonts.googleapis.com/" />

    <!-- Sitemap for SEO -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Schema.org Organization Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Porous Being",
        "url": "https://porous-being.com/",
        "sameAs": [
          "https://www.facebook.com/porousbeing",
          "https://www.instagram.com/porousbeing",
          "https://www.linkedin.com/company/porous-being"
        ]
      }
    </script>
  </head>
  <body>
    <!-- Performance Optimization: Detect slow devices and motion preferences -->
    <script>
      // Disable heavy animations on slow devices
      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;
      const isSlowDevice =
        navigator.deviceMemory < 4 || navigator.hardwareConcurrency < 2;

      if (prefersReducedMotion || isSlowDevice) {
        document.documentElement.style.setProperty(
          "--animation-disabled",
          "true",
        );
      }

      // Preload critical resources
      const link = document.createElement("link");
      link.rel = "prefetch";
      link.as = "image";
      link.href = "/src/assets/Porous_Logo.png";
      document.head.appendChild(link);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
